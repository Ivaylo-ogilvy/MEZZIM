<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEZZIM 2025</title>
<style>
  /* ── Fonts ── */
  @font-face { font-family:'NM-BoldExtraSqueezed'; src:url('fonts/OTNeueMontreal-BoldExtraSqueezed.otf'); }
  @font-face { font-family:'NM-BoldSemiSqueezed';  src:url('fonts/OTNeueMontreal-BoldSemiSqueezed.otf'); }
  @font-face { font-family:'NM-BoldSqueezed';      src:url('fonts/OTNeueMontreal-BoldSqueezed.otf'); }
  @font-face { font-family:'NM-BoldUltraSqueezed'; src:url('fonts/OTNeueMontreal-BoldUltraSqueezed.otf'); }
  @font-face { font-family:'NM-BookExtraSqueezed'; src:url('fonts/OTNeueMontreal-BookExtraSqueezed.otf'); }
  @font-face { font-family:'NM-BookSemiSqueezed';  src:url('fonts/OTNeueMontreal-BookSemiSqueezed.otf'); }
  @font-face { font-family:'NM-BookSqueezed';      src:url('fonts/OTNeueMontreal-BookSqueezed.otf'); }
  @font-face { font-family:'NM-BookUltraSqueezed'; src:url('fonts/OTNeueMontreal-BookUltraSqueezed.otf'); }
  @font-face { font-family:'NM-MediumSqueezed';    src:url('fonts/OTNeueMontreal-MediumSqueezed.otf'); }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width:100vw; height:100vh;
    overflow:hidden;
    background:#000;
    user-select:none;
  }

  /* ── Background Layers ── */
  #bg-video {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    filter:grayscale(100%) brightness(0.42) contrast(1.2);
    z-index:0;
  }
  #bg-overlay {
    position:absolute; inset:0; z-index:1;
    background:radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.75) 100%);
    pointer-events:none;
  }
  #grain {
    position:absolute; inset:0; z-index:2; pointer-events:none; opacity:0.12;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:128px;
  }

  /* ── Desktop layer ── */
  #desktop { position:absolute; inset:0; z-index:4; }

  #header {
    position:absolute; top:0; left:0; right:0;
    height:135px;
    display:flex; align-items:center; justify-content:center;
    z-index:10; pointer-events:none;
  }
  #header-left, #header-right {
    font-family:'NM-BookUltraSqueezed', sans-serif;
    color:#ff2d8f; font-size:20px; letter-spacing:0.15em;
    text-shadow:0 0 8px #ff2d8f66; padding:0 22px;
  }
  #logo { width:180px; flex-shrink:0; }
  #logo svg { width:100%; height:auto; display:block; }

  /* ── Icons (Fixed Initial Positions) ── */
  .icon {
    position:absolute;
    display:flex; flex-direction:column; align-items:center;
    gap:10px; cursor:grab;
    width: 120px;
  }
  .icon:active { cursor:grabbing; }
  .icon-img { transition:transform .15s, filter .15s; }
  .icon:hover .icon-img {
    transform:scale(1.08);
    filter:drop-shadow(0 0 14px rgba(255,45,143,0.75)) brightness(1.1);
  }
  .icon img { display:block; pointer-events:none; }
  .icon-label {
    font-family:'NM-MediumSqueezed', sans-serif;
    color:#ff2d8f; font-size:17px;
    letter-spacing:0.08em; text-shadow:0 0 8px #ff2d8faa;
    text-align:center; white-space:nowrap;
  }

  /* ── Taskbar (Exact Alignment) ── */
  #taskbar {
    position:absolute; bottom:0; left:0; right:0;
    height:66px; 
    z-index:20;
    display:flex;
  }
  #taskbar-bg {
    position:absolute; inset:0;
    width:100%; height:100%;
  }
  #taskbar-bg svg {
    width:100%; height:100%;
    display:block;
    preserveAspectRatio: none;
  }
  #taskbar-btns {
    position:relative; z-index:1;
    display:flex; align-items: flex-end; 
    height:100%;
  }
  .tb-svg-btn {
    display:block; cursor:pointer;
    transition:filter .15s;
  }
  .tb-svg-btn:hover { filter:brightness(1.2); }

  /* Precise Scaling to match Reference wells */
  #btn-dontpress { height: 66px; width: auto; }
  #btn-lol { height: 41px; margin-bottom: 12px; margin-left: 2px; }
  #btn-ps  { height: 41px; margin-bottom: 12px; margin-left: 2px; }

  /* ── Windows ── */
  .win {
    position:absolute; min-width:300px; min-height:180px;
    background:rgba(8,8,8,0.95);
    border:1px solid rgba(255,45,143,0.45);
    z-index:100; display:none; flex-direction:column;
  }
  .win.open { display:flex; }
  .win-titlebar {
    height:36px; background:rgba(255,45,143,0.1);
    display:flex; align-items:center; padding:0 10px; cursor:grab;
  }
</style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="images/background-video (1).mp4" type="video/mp4">
</video>
<div id="bg-overlay"></div>
<div id="grain"></div>

<div id="header">
  <span id="header-left">MEZZIM</span>
  <div id="logo"><svg width="265" height="181" viewBox="0 0 265 181" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M212.596 66.8538C215.907 69.5053 212.784 81.0542 205.594 81.0542..." fill="#E641A7"/>
  </svg></div>
  <span id="header-right">2025</span>
</div>

<div id="desktop">
  <div class="icon" id="icon-us" style="left: 80px; top: 180px;" ondblclick="openWin('win-us')">
    <div class="icon-img"><img src="icons/us.svg" width="95"></div>
    <span class="icon-label">/US</span>
  </div>

  <div class="icon" id="icon-gallery" style="left: 450px; top: 140px;" ondblclick="openWin('win-gallery')">
    <div class="icon-img"><img src="icons/gallery.svg" width="105"></div>
    <span class="icon-label">/GALLERY</span>
  </div>

  <div class="icon" id="icon-about" style="left: 820px; top: 380px;" ondblclick="openWin('win-about')">
    <div class="icon-img"><img src="icons/about.svg" width="90"></div>
    <span class="icon-label">//ABOUT</span>
  </div>

  <div class="icon" id="icon-tunes" style="left: 1350px; top: 200px;" ondblclick="openWin('win-tunes')">
    <div class="icon-img"><img src="icons/tunes.svg" width="85"></div>
    <span class="icon-label">/TUNES</span>
  </div>

  <div class="icon" id="icon-dont" style="right: 180px; top: 160px;" ondblclick="openWin('win-dontpress')">
    <div class="icon-img"><img src="icons/don't.svg" width="85"></div>
    <span class="icon-label">//DON'T!!</span>
  </div>

  <div class="icon" id="icon-trash" style="right: 100px; bottom: 120px;">
    <div class="icon-img"><img src="icons/trash.svg" width="75"></div>
    <span class="icon-label">TRASH</span>
  </div>
</div>

<div id="taskbar">
  <div id="taskbar-bg">
    <svg width="1920" height="66" viewBox="0 0 1920 66" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="1920" height="66" fill="#1A1A1A"/>
    </svg>
  </div>
  <div id="taskbar-btns">
    <img id="btn-dontpress" class="tb-svg-btn" src="icons/tb-dontpress.svg" onclick="openWin('win-dontpress')">
    <img id="btn-lol" class="tb-svg-btn" src="icons/tb-lol.svg">
    <img id="btn-ps" class="tb-svg-btn" src="icons/tb-ps.svg">
  </div>
</div>

<script>
let dragging=null, winDragging=null, offsetX=0, offsetY=0, wx=0, wy=0, z=1000;
function bringToFront(el){ el.style.zIndex = ++z; }

document.addEventListener('mousedown', (e)=>{
  const icon = e.target.closest('.icon');
  const win = e.target.closest('.win');
  const titlebar = e.target.closest('.win-titlebar');
  if(icon){ dragging = icon; offsetX = e.clientX - icon.offsetLeft; offsetY = e.clientY - icon.offsetTop; bringToFront(icon); }
  if(titlebar && win){ winDragging = win; wx = e.clientX - win.offsetLeft; wy = e.clientY - win.offsetTop; bringToFront(win); }
});

document.addEventListener('mousemove', (e)=>{
  if(dragging){ dragging.style.left = (e.clientX - offsetX) + 'px'; dragging.style.top = (e.clientY - offsetY) + 'px'; }
  if(winDragging){ winDragging.style.left = (e.clientX - wx) + 'px'; winDragging.style.top = (e.clientY - wy) + 'px'; }
});

document.addEventListener('mouseup', ()=>{ dragging = null; winDragging = null; });
function openWin(id){ document.getElementById(id).classList.add('open'); }
</script>

</body>
</html>
